<app-header></app-header>
<div class="container my-5 text-white d-flex justify-content-center align-items-center">
  <div class="bg-sarcel rounded-4 p-4 shadow col-lg-6">
    <h1 class="text-center mb-4">Connexion</h1>
    <form action="http://localhost:8000/api/login" method="POST">
      <div class="mb-3">
        <label for="email" class="form-label">Adresse e-mail</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Entrez votre adresse e-mail" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Entrez votre mot de passe" required>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-outline-warning btn-lg">Se connecter</button>
      </div>
    </form>
  </div>
</div>
<app-footer></app-footer>
